blueprint_id: blueprint_jiraflow
name: Openflow Jira Cloud Connector Setup
summary: Deploy and configure the Snowflake Openflow Jira Cloud connector on an SPCS runtime to sync Jira issues into Snowflake.
overview: 'This workflow guides you through setting up the Snowflake Openflow Jira Cloud
  connector on an SPCS (Snowpark Container Services) runtime. The connector uses SNOWFLAKE_MANAGED
  authentication — no key pair required — and syncs Jira issues into a Snowflake table
  on a configurable schedule using a full re-fetch + MERGE strategy.


  Starting from your Snowflake account, you will create the required network access
  infrastructure (network rule, external access integration), provision the destination
  warehouse and database objects, and grant the necessary privileges to the OpenFlow
  runtime role. You will then deploy the Jira connector via nipyapi, configure its
  parameter context with your Jira credentials and Snowflake destination, enable controller
  services, and start the flow.


  By the end of this workflow, you will have a running Jira Cloud connector that:

  - Fetches all issues from the specified Jira project(s) every 5 minutes

  - Merges new and updated issues into a Snowflake table (no duplicates)

  - Authenticates to Snowflake using the runtime identity (SNOWFLAKE_MANAGED)

  - Routes all Jira API traffic through a Snowflake External Access Integration


  **Prerequisites**: This workflow assumes you have Snowflake Openflow deployed on
  an SPCS runtime, nipyapi CLI installed (>=1.2.0), and a Jira Cloud instance with
  API token access.'
is_repeatable: true
